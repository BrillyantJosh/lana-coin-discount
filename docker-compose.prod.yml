version: "3.8"

services:
  lana-discount-web:
    build: .
    container_name: lana-discount-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VIRTUAL_HOST=www.lana.discount,lana.discount
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=www.lana.discount,lana.discount
      - LETSENCRYPT_EMAIL=josh@lanaworld.app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lana-discount-data:/app/data
    networks:
      - webproxy

volumes:
  lana-discount-data:

networks:
  webproxy:
    external: true
